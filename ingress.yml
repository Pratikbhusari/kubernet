apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: pratik-Ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"

spec:
  ingressClassName: nginx

  rules:
    - http:
        paths:
          - path: /nginx(/|$)(.*)
            pathType: Prefix

            backend:
              service:
                name: pratik-service
                port:
                  number: 80

